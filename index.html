<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>CPR Analytics - Bodyshop Performance Dashboard</title>
  </head>
  <body class="bg-surface-900 text-white min-h-screen antialiased">
    <script>
      // Automatically sanitize corrupted Supabase error hashes to prevent infinite login loops
      if (window.location.hash.includes('error=access_denied')) {
        window.history.replaceState(null, '', window.location.pathname + window.location.search);
      }
      
      // Capture the hash and search before any React or Supabase modules load and strip it!
      window.__INITIAL_HASH__ = window.location.hash;
      window.__INITIAL_SEARCH__ = window.location.search;
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
